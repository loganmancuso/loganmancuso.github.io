# Site settings
title: "Resume"
description: "A resume for Jekyll and GitHub Pages sites."

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar:                  "true"
resume_name:                    "Logan Mancuso"
resume_title:                   "DevSecOps Engineer, Software Engineer"

# used for the contact button in _layouts/resume.html
resume_contact_email:           "logan@mancuso.in"

# the next two items are used for schema itemprops in _layouts/resume.html
resume_contact_telephone:       "(803) 470-3985"
resume_contact_address:         "Columbia, South Carolina"

resume_header_contact_info:     "Columbia, SC • (803) 470-3985 • logan@mancuso.in"
display_header_contact_info:    "true"

resume_header_intro: "<p>Welcome! My name is Logan and this is my website where I post my most relevant work experience and display my technical knowledge.</p>"

# use "yes" to display the email contact button,
# "no" to display an "I'm not looking for work" message,
# or remove the resume_looking_for_work option entirely
# to leave blank
resume_looking_for_work:        "no"

# Decide which sections to use
# comment out to hide
resume_section_experience:      true
resume_section_projects:        true
resume_section_skills:          true
resume_section_recognition:     true
resume_section_links:           false
resume_section_associations:    false
resume_section_interests:       false

# Resume social links
# uncomment the options you wish to display, and add your own URL
resume_social_links:
  resume_github_url:            "https://github.com/loganmancuso"
  # resume_twitter_url:           ""
  # resume_dribbble_url:          ""
  # resume_facebook_url:          ""
  resume_linkedin_url:          "https://www.linkedin.com/in/mancuso-logan"
  # resume_instagram_url:         ""
  resume_gitlab_url:            "https://gitlab.com/loganmancuso"
  # resume_website_url:           ""
  # resume_medium_url:            ""
resume_print_social_links:      true

# Design settings
resume_theme:                   default

# Note: when editing locally, remember to restart
# your Jekyll server when you edit this file. Changes
# to _config.yml are only recognized when the server starts
